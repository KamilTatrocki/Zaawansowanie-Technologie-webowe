input UserInput {
   name: String!
   email: String!
   login: String!
}

type User {
   id: ID!
   name: String!
   email: String!
   login: String!
   todos: [TodoItem!]!
   testTodos: [TodoItem!]! @deprecated(reason: "use todos instead")
}

input TodoItemInput {
   title: String!
   completed: Boolean!
   user_id: ID!
}

type TodoItem {
   id: ID!
   title: String!
   completed: Boolean!
   user: User!
   testUser: User! @deprecated(reason: "user user instead")
}

type Query {
     todos: [TodoItem!]
     todo(id: ID!): TodoItem
     users: [User!]
     user(id: ID!): User
}

type Mutation {
   createUser(user: UserInput!): User
   updateUser(id: ID!, user: UserInput!): User
   deleteUser(id: ID!): User

   createTodo(todo: TodoItemInput!): TodoItem
   updateTodo(id: ID!, todo: TodoItemInput!): TodoItem
   deleteTodo(id: ID!): TodoItem
}
