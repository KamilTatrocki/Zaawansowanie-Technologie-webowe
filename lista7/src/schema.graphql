input UserInput {
   name: String!
   email: String!
   login: String!
}

type User {
   id: ID!
   name: String!
   email: String!
   login: String!
   todos: [TodoItem!]!
}

input TodoItemInput {
   title: String!
   completed: Boolean!
}

type TodoItem {
   id: ID!
   title: String!
   completed: Boolean!
   user: User!
}

type Query {
     todos: [TodoItem!]
     todo(id: ID!): TodoItem
     users: [User!]
     user(id: ID!): User
}

type Mutation {
   createUser(user: UserInput!): User
   createTodo(todo: TodoItemInput!): TodoItem
}
